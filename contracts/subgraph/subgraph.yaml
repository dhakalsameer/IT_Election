specVersion: 0.0.4
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: Election3
    network: sepolia
    source:
      address: "0x9499048274610DeAfd6353e385470D8483ED4f33"
      abi: Election3
      startBlock: 11108310
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - Candidate
        - Vote
        - ElectionMeta
        - ElectionResult
      abis:
        - name: Election3
          file: ./abi/Election3.json
      eventHandlers:
        - event: CandidateRegistered(indexed uint256,indexed address,string,uint8)
          handler: handleCandidateRegistered
        - event: VoteCast(indexed address,uint256)
          handler: handleVoteCast
        - event: MerkleRootUpdated(bytes32)
          handler: handleMerkleRootUpdated
        - event: IdentityMerkleRootUpdated(bytes32)
          handler: handleIdentityMerkleRootUpdated
        - event: NewElectionStarted(indexed uint256)
          handler: handleNewElectionStarted
      file: ./mapping.ts
